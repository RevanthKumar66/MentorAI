version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mentorai-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentorai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mentorai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mentorai-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: mentorai-api-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/mentorai
      - REDIS_URL=redis://redis:6379/0
      - ENV=development
      - DEBUG=true
    volumes:
      - ../../services/api:/app/services/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: mentorai-web-dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_SUPABASE_URL=https://placeholder-project.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
    volumes:
      - ../../apps/web:/app/apps/web
      - /app/apps/web/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
